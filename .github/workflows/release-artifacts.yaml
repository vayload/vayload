name: Build and publish release packages

permissions:
    contents: write

on:
    release:
        types: [published]

env:
    APP_NAME: vayload
    VERSION: ${{ github.event.release.tag_name }}

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Run Go tests
              run: make test

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install frontend dependencies
              run: |
                  cd web
                  pnpm install --frozen-lockfile

            - name: Run frontend type check
              run: |
                  cd web
                  pnpm run check

    build:
        name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        needs: test
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      goos: linux
                      goarch: amd64
                    - os: macos-latest
                      goos: darwin
                      goarch: arm64
                    - os: windows-latest
                      goos: windows
                      goarch: amd64

        steps:
            - uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Build and package
              run: make package
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.goos }}-${{ matrix.goarch }}
                  path: release/*

    release:
        name: Upload Release Assets
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Upload assets to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/**/*
